# docker-compose.yml
# Production Juddges Application Services
#
# ENVIRONMENT CONFIGURATION:
#   - .env (gitignored, contains all actual values)
#   - .env.example (committed, template with variable names)
#
# IMAGE TAG:
#   Set JUDDGES_IMAGE_TAG in .env or environment to pin a version.
#   Defaults to "latest" if unset.
#
# SETUP:
#   1. Copy .env.example to .env
#   2. Fill in actual values in .env
#   3. Run: docker compose up -d
#   (or use: ./scripts/deploy_prod.sh)

services:
  # ============================================================================
  # Application Services
  # ============================================================================

  frontend:
    image: ${DOCKER_USERNAME}/juddges-frontend:${JUDDGES_IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: juddges-frontend
    expose:
      - "3006"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Runtime configuration
      - PORT=3006
      - HOSTNAME=0.0.0.0
      # Server-side routes inside the frontend container must use Docker service names
      - API_BASE_URL=http://backend:8002
    # All other environment variables loaded from env_file
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.depends-on=backend"
      - "com.juddges.service=application"
      - "com.juddges.service.type=frontend"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
      - data_stack_network  # Caddy reverse proxy network
    # Health check for Next.js frontend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3006/', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Structured logging with rotation for production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  backend:
    image: ${DOCKER_USERNAME}/juddges-backend:${JUDDGES_IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: juddges-backend
    expose:
      - "8002"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Internal service discovery for container-to-container communication
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_INTERNAL_URL=http://meilisearch:7700
    # All other environment variables loaded from env_file
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.juddges.service=application"
      - "com.juddges.service.type=backend-api"
    depends_on:
      - meilisearch
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
      - data_stack_network  # Caddy reverse proxy network
    # Health check for FastAPI backend using dedicated health endpoint
    # Uses /health/healthz - lightweight check without authentication
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Structured logging with rotation for production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
        reservations:
          cpus: '4'
          memory: 12G

  # ============================================================================
  # Search Infrastructure (Optional)
  # ============================================================================

  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: juddges-meilisearch
    restart: unless-stopped
    expose:
      - "7700"
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:?MEILI_MASTER_KEY must be set for production Meilisearch}
      - MEILI_ENV=production
      - MEILI_MAX_INDEXING_MEMORY=1536MiB
      - MEILI_LOG_LEVEL=WARN
    # HNSW indexing of large vector corpora opens many mmap files. Without this,
    # the container inherits Docker's default soft limit and trips EMFILE
    # ("too_many_open_files") during embedder/settings apply.
    ulimits:
      nofile:
        soft: 524288
        hard: 524288
    volumes:
      - meilisearch-data:/meili_data
    labels:
      - "com.juddges.service=infrastructure"
      - "com.juddges.service.type=search"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7700/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================================================
  # Background Workers
  # ============================================================================

  backend-worker:
    image: ${DOCKER_USERNAME}/juddges-backend:${JUDDGES_IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: juddges-backend-worker
    command: celery -A app.workers worker --loglevel=info
    restart: unless-stopped
    # PRODUCTION NOTE: Development volume mount removed for production deployment
    # In production, code is baked into the Docker image at build time for:
    # - Immutable deployments (no runtime code changes)
    # - Better performance (no bind mount overhead)
    # - Security (no host filesystem access)
    # - Consistency (same code across all environments)
    #
    # For local development, uncomment the following line:
    # volumes:
    #   - ./backend:/app
    env_file:
      - .env
    environment:
      # Internal service discovery for container-to-container communication
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_INTERNAL_URL=http://meilisearch:7700
    # All environment variables loaded from env_file
    labels:
      - "com.juddges.service=application"
      - "com.juddges.service.type=worker"
    depends_on:
      - meilisearch
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
    # Health check for Celery worker
    # Checks if Celery process is running and responsive
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers inspect ping -d celery@$$HOSTNAME"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s
    # Structured logging with rotation for production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 4G

  backend-beat:
    image: ${DOCKER_USERNAME}/juddges-backend:${JUDDGES_IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: juddges-backend-beat
    command: celery -A app.workers beat --loglevel=info
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Internal service discovery for container-to-container communication
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_INTERNAL_URL=http://meilisearch:7700
    labels:
      - "com.juddges.service=application"
      - "com.juddges.service.type=beat-scheduler"
    depends_on:
      - meilisearch
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
    # Health check for Celery Beat scheduler
    # Verifies the beat scheduler process is running
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

# ==============================================================================
# Volumes
# ==============================================================================

volumes:
  meilisearch-data:
    name: juddges-meilisearch-data
    driver: local

# ==============================================================================
# Networks
# ==============================================================================

networks:
  # Internal network for inter-service communication (frontend, backend, backend-worker)
  app-network:
    name: juddges-app-network
    driver: bridge

  # External Caddy reverse proxy network (shared with caddy-local gateway)
  data_stack_network:
    external: true
