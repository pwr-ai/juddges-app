# Extraction context templates by jurisdiction
extraction_contexts:
  en_uk: |
    You are analyzing a UK criminal appeal court judgment. Extract structured information
    following the schema provided. Pay attention to UK legal terminology and court structures.

    Key UK terms to look for:
    - Crown Court, Court of Appeal, High Court
    - Appellant, Respondent, Crown
    - Barrister, Solicitor, QC/KC
    - Guilty plea, Not guilty plea
    - Concurrent/Consecutive sentences
    - Ancillary orders (restraining order, compensation order, etc.)

  pl: |
    Analizujesz polski wyrok sądu karnego lub apelacyjnego. Wyodrębnij strukturalne informacje
    zgodnie z podanym schematem. Zwróć uwagę na polską terminologię prawną i strukturę sądów.

    Kluczowe polskie terminy:
    - Sąd Rejonowy, Sąd Okręgowy, Sąd Apelacyjny, Sąd Najwyższy
    - Oskarżony, Obrońca, Prokurator
    - Przyznanie się do winy, Nieprzyznanie się
    - Kary łączne, Kary jednostkowe
    - Środki karne (zakaz prowadzenia pojazdów, przepadek, nawiązka)
