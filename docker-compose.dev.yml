# docker-compose.dev.yml
# Development Juddges Application Services
#
# Features:
# - Hot reload for frontend and backend
# - Development-specific volumes for code mounting
# - Exposed ports for direct access
# - Development environment variables
# - No health checks (faster startup, not needed for local dev)
# - No resource limits (full access to host resources)
# - Minimal configuration (easier debugging)
#
# ENVIRONMENT CONFIGURATION:
#   - .env (gitignored, contains all actual values)
#   - .env.example (committed, template with variable names)
#
# SETUP:
#   1. Copy .env.example to .env
#   2. Fill in actual values in .env
#   3. Run: docker compose -f docker-compose.dev.yml up -d

services:
  # ============================================================================
  # Application Services (Development)
  # ============================================================================

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: juddges-frontend-dev
    ports:
      - "3007:3000"
    restart: unless-stopped
    command: ["npx", "next", "dev"]
    env_file:
      - .env
    environment:
      # Development environment override
      - NODE_ENV=development
      # API URLs for container-to-container communication
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8004}
      - API_BASE_URL=http://backend-dev:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next  # Keep .next in container to avoid permission issues
    labels:
      - "com.juddges.service=application"
      - "com.juddges.service.type=frontend"
      - "com.juddges.environment=development"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-dev-network

  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: juddges-backend-dev
    ports:
      - "8004:8080"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Development environment override
      - PYTHON_ENV=development
      # HuggingFace cache configuration (container-specific paths)
      - HF_HOME=/tmp/hf
      - HF_HUB_CACHE=/tmp/hf/hub
      - TRANSFORMERS_CACHE=/tmp/hf/transformers
    # All other environment variables (Supabase, OpenAI, Redis, Langfuse, etc.) loaded from env_file
    tty: true
    volumes:
      - ./backend:/app
      - hf-cache-dev:/tmp/hf
    labels:
      - "com.juddges.service=application"
      - "com.juddges.service.type=backend-api"
      - "com.juddges.environment=development"
    depends_on:
      - backend-worker-dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-dev-network

  backend-worker-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: juddges-backend-worker-dev
    command: celery -A app.workers worker --loglevel=info
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Development environment override
      - PYTHON_ENV=development
      # HuggingFace cache configuration (container-specific paths)
      - HF_HOME=/tmp/hf
      - HF_HUB_CACHE=/tmp/hf/hub
      - TRANSFORMERS_CACHE=/tmp/hf/transformers
    # All other environment variables (Supabase, OpenAI, Redis, Langfuse, etc.) loaded from env_file
    volumes:
      - ./backend:/app
      - hf-cache-dev:/tmp/hf
    labels:
      - "com.juddges.service=application"
      - "com.juddges.service.type=worker"
      - "com.juddges.environment=development"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-dev-network

# ==============================================================================
# Volumes (Development-Specific)
# ==============================================================================

volumes:
  # Development cache volumes
  next-cache-dev:
    name: juddges-next-cache-dev
    driver: local
  hf-cache-dev:
    name: juddges-hf-cache-dev
    driver: local

# ==============================================================================
# Networks
# ==============================================================================

networks:
  # Single development network for all application services
  # External services (Supabase, Redis) are accessed via host.docker.internal or external URLs
  app-dev-network:
    name: juddges-app-dev-network
    driver: bridge

# ==============================================================================
# Notes
# ==============================================================================
# DEVELOPMENT vs PRODUCTION DIFFERENCES:
#
# Development services (docker-compose.dev.yml) have:
# - No health checks (faster startup, not needed for local dev)
# - No resource limits (full access to host resources)
# - No watchtower auto-update labels (not used in dev)
# - No structured logging configuration (use docker logs directly)
# - Minimal configuration (easier debugging)
# - Hot reload enabled via volume mounts
#
# Production services (docker-compose.yml) include:
# - Health checks for monitoring (frontend, backend, worker)
# - Resource limits to prevent resource exhaustion
# - Watchtower integration for automatic updates
# - Structured logging with rotation
# - Code baked into images (no volume mounts)
#
# NETWORK ARCHITECTURE:
# - All development services use a single network: app-dev-network
# - External infrastructure (Supabase, Redis, PostgreSQL) accessed via:
#   * External URLs (Supabase: SUPABASE_URL in .env)
#   * host.docker.internal (for local services if needed)
# - No external network dependencies
# - Simplified single-network architecture for development
# ==============================================================================
