    en_us: "Trial Court(s) where Defendant was Convicted"
    pl: "Nazwa sądu/sądów, w których oskarżony został skazany"

  sent_court_name:
    en_uk: "Court Name where Offender Sentenced"
    en_us: "Sentencing Court Name"
    pl: "Nazwa sądu wymierzającego karę"

  # Representatives
  offender_representative_name:
