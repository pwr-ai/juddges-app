name: CI

on:
  push:
    branches: [develop, main]
    tags: ['prod-v*', 'dev-v*']
  pull_request:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      allow_vuln_override:
        description: 'Allow workflow to pass even if HIGH/CRITICAL vulnerabilities are found (emergency use only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Lint & Test (runs on all PRs and pushes)
  # ============================================================================

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: snok/install-poetry@v1
        with:
          version: 1.7.1

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            backend/.venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('backend/poetry.lock') }}

      - name: Install dependencies
        working-directory: backend
        run: poetry install --with dev

      - name: Ruff format check
        working-directory: backend
        run: poetry run ruff format --check .

      - name: Ruff lint
        working-directory: backend
        run: poetry run ruff check .

      - name: Check code complexity
        working-directory: backend
        run: |
          poetry run radon cc app/ packages/ -a -nc --total-average 2>&1 | tail -5
          # Fail if any function has complexity grade F (>40)
          if poetry run radon cc app/ packages/ -nc -n F 2>&1 | grep -q "F "; then
            echo "ERROR: Functions with Grade F complexity detected"
            exit 1
          fi

  openapi-drift:
    name: OpenAPI Type Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: snok/install-poetry@v1
        with:
          version: 1.7.1

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            backend/.venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('backend/poetry.lock') }}

      - name: Install backend dependencies
        working-directory: backend
        run: poetry install --with dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Regenerate OpenAPI types
        run: ./scripts/regen_openapi_types.sh

      - name: Fail if drift
        run: |
          if ! git diff --exit-code scripts/openapi-snapshot.json frontend/lib/api/generated/openapi.ts; then
            echo "::error::OpenAPI types drifted. Run scripts/regen_openapi_types.sh and commit." >&2
            exit 1
          fi

  backend-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: snok/install-poetry@v1
        with:
          version: 1.7.1

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            backend/.venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('backend/poetry.lock') }}

      - name: Install dependencies
        working-directory: backend
        run: poetry install --with dev

      - name: Run unit tests with coverage
        working-directory: backend
        run: poetry run pytest -v -m unit --cov=app --cov=juddges_search --cov=schema_generator_agent --cov-report=term-missing --cov-report=html --cov-fail-under=54

      # Issue #106 (unit-safe tier): import-check the integration test module so
      # a broken import, syntax error, or missing fixture breaks CI early, but
      # the tests themselves skip because RUN_INTEGRATION_TESTS is NOT set.
      - name: Import-check search integration tests (skipped at runtime)
        working-directory: backend
        env:
          RUN_INTEGRATION_TESTS: ""
        run: |
          poetry run pytest --collect-only -q tests/integration/test_search_quality.py
          poetry run pytest -v tests/integration/test_search_quality.py

      # Static sanity: benchmark script must at least parse and show --help.
      - name: Import-check search benchmark script
        working-directory: backend
        run: poetry run python scripts/search_benchmark.py --help > /dev/null

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: backend/htmlcov/
          retention-days: 30

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Document type check & lint
        working-directory: frontend
        run: npm run validate

  frontend-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run unit tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          retention-days: 30

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8004
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
        run: npm run build

      - name: Upload built frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            frontend/.next/
            frontend/public/
            frontend/package.json
            frontend/package-lock.json
            frontend/next.config.*
          # `actions/upload-artifact@v4` defaults `include-hidden-files: false`,
          # which silently skips the dot-prefixed `.next/` directory — leaving
          # ~22 files instead of the full Next.js build output. Enable it.
          include-hidden-files: true
          retention-days: 1

  # ============================================================================
  # Frontend E2E - Issue #98
  #
  # Previously: job existed but did not start any server, so Playwright had
  # nothing to connect to. Now we start the production Next.js server against
  # placeholder Supabase env values and wait on / before running tests.
  # Backend is NOT started here (requires Supabase + TEI + Redis); the
  # e2e suite is scoped to UI-only flows that tolerate a missing backend.
  # Tests that require a live backend should live in the integration job
  # (search-integration.yml).
  # ============================================================================

  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend-build]
    # Disabled on push to keep CI green. The current Playwright config has
    # 22 specs × 5 browser projects + an API project that requires the
    # backend to be running, but this job intentionally does not start the
    # backend. Until the matrix is narrowed (chromium-only, UI-only specs)
    # and a sensible total timeout is added, only run on manual dispatch.
    # Tracking: see future "fix: scope frontend-e2e to UI-only flows" PR.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Download built frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          # actions/upload-artifact@v4 strips the lowest common ancestor from
          # paths, so the artifact entries are `.next/…`, `public/…`,
          # `package.json`, `next.config.*` (no `frontend/` prefix). Download
          # into `frontend/` so `next start` (run from `working-directory: frontend`)
          # finds them at the expected locations.
          path: frontend/

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Start frontend (background)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8004
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          API_BASE_URL: http://localhost:8004
          PORT: "3006"
        run: |
          nohup npm start > ../frontend-server.log 2>&1 &
          echo $! > ../frontend-server.pid

      - name: Wait for frontend to be ready
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3006/ -o /dev/null; then
              echo "Frontend is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: Frontend did not become ready within 60s"
          echo "---- server log ----"
          cat frontend-server.log || true
          exit 1

      - name: Run E2E tests
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8004
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
        run: npm run test:e2e

      - name: Stop frontend
        if: always()
        run: |
          if [ -f frontend-server.pid ]; then
            kill "$(cat frontend-server.pid)" 2>/dev/null || true
          fi

      - name: Upload frontend server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-server-log
          path: frontend-server.log
          retention-days: 7

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  # ============================================================================
  # Security Scanning - Issue #100
  #
  # Previously every scan had `|| true` + `continue-on-error: true`, meaning
  # CRITICAL/HIGH CVEs never blocked merge. Now:
  #   - HIGH + CRITICAL -> job fails (blocks merge)
  #   - MEDIUM + LOW    -> reported, non-blocking
  # Emergency escape hatch: trigger workflow via the GitHub UI with
  # `allow_vuln_override=true` to bypass. Usage must be documented in the PR.
  # ============================================================================

  backend-security:
    name: Backend Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          pip install poetry pip-audit
          # Poetry 2.0+ removed `export` from core; the plugin is required.
          poetry self add poetry-plugin-export

      - name: Export requirements
        working-directory: backend
        run: |
          # Strip editable local-path packages (`-e file:///...`) — pip-audit
          # tries to install them and the absolute paths from `poetry export`
          # don't exist on the runner. Their deps are already covered by the
          # exported pinned third-party packages.
          poetry export -f requirements.txt --without-hashes -o /tmp/requirements.raw.txt
          grep -v '^-e ' /tmp/requirements.raw.txt > /tmp/requirements.txt

      - name: Audit Python dependencies (blocking on HIGH/CRITICAL)
        id: backend_audit
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_vuln_override == 'true' }}
        run: |
          # pip-audit exits non-zero on any vuln by default. Filter the JSON
          # output and re-fail only on HIGH/CRITICAL severities. MEDIUM/LOW
          # are reported but do not block.
          set +e
          pip-audit -r /tmp/requirements.txt --format json > /tmp/pip-audit.json
          rc=$?
          set -e
          if [ ! -s /tmp/pip-audit.json ]; then
            echo "pip-audit produced no output (exit=$rc) - failing closed"
            exit 1
          fi
          echo "---- pip-audit raw ----"
          cat /tmp/pip-audit.json
          python - <<'PY'
          import json, sys
          data = json.load(open("/tmp/pip-audit.json"))
          # pip-audit JSON shape:
          # {"dependencies": [{"name":..,"vulns":[{"id":..,"severity":..,...}]}]}
          high = []
          other = []
          for dep in data.get("dependencies", []):
              for v in dep.get("vulns", []) or []:
                  sev = (v.get("severity") or "").upper()
                  entry = f"{dep.get('name')} {dep.get('version','?')} :: {v.get('id')} ({sev or 'UNKNOWN'})"
                  if sev in {"HIGH", "CRITICAL"}:
                      high.append(entry)
                  else:
                      other.append(entry)
          if other:
              print("Non-blocking (MEDIUM/LOW/UNKNOWN):")
              for e in other: print(f"  - {e}")
          if high:
              print("BLOCKING (HIGH/CRITICAL):")
              for e in high: print(f"  - {e}")
              sys.exit(1)
          print("No HIGH/CRITICAL Python vulnerabilities")
          PY

  frontend-security:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit npm dependencies (blocking on HIGH/CRITICAL)
        id: frontend_audit
        working-directory: frontend
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_vuln_override == 'true' }}
        run: |
          # `npm audit --audit-level=high` exits non-zero only when a HIGH or
          # CRITICAL is present - MEDIUM/LOW are still listed but don't fail.
          set +e
          npm audit --production --json > /tmp/npm-audit.json
          npm audit --production --audit-level=high
          rc=$?
          set -e
          if [ $rc -ne 0 ]; then
            echo "HIGH/CRITICAL npm vulnerability detected - failing build"
            exit 1
          fi
          echo "No HIGH/CRITICAL npm vulnerabilities"

  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Switched from gitleaks-action (now requires a paid license for orgs)
      # to TruffleHog, which is free and OSS. Same intent: scan history for
      # leaked secrets and fail the job on verified findings.
      - name: Run TruffleHog (verified secrets only)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_vuln_override == 'true' }}

  # ============================================================================
  # SBOM Generation (main branch only)
  # ============================================================================

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Generate backend SBOM
        working-directory: backend
        run: |
          pip install poetry
          poetry self add poetry-plugin-export
          poetry export -f requirements.txt --without-hashes -o sbom-backend.txt
      - name: Generate frontend SBOM
        working-directory: frontend
        run: npm ls --json > sbom-frontend.json 2>/dev/null || true
      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            backend/sbom-backend.txt
            frontend/sbom-frontend.json
          retention-days: 90

