    negative_ids:
      - 9e381728-88f6-4dca-bc45-b85cb9b75b50
      - 1607c70f-b6b0-4c9b-945f-6ed4aeab30b6

  - id: znecanie
    query: "znęcanie się nad członkiem rodziny przemoc domowa"
