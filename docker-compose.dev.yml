# docker-compose.dev.yml
# Development Juddges Application Services
#
# Features:
# - Hot reload for frontend and backend
# - Development-specific volumes for code mounting
# - Exposed ports for direct access
# - Development environment variables
#
# USAGE:
#   docker compose -f docker-compose.dev.yml up -d

services:
  # ============================================================================
  # Application Services (Development)
  # ============================================================================

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: juddges-frontend-dev
    ports:
      - "3007:3000"
    restart: unless-stopped
    user: "1000:1000"  # Run as host user for proper file permissions
    entrypoint: []
    command: ["npx", "next", "dev"]
    env_file:
      - .env
      - .env.secrets
      - .env.dev
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8004}
      - API_BASE_URL=http://backend-dev:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next  # Keep .next in container to avoid permission issues
    labels:
      - "com.juddges.service=application"
      - "com.juddges.service.type=frontend"
      - "com.juddges.environment=development"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-dev-network

  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: juddges-backend-dev
    ports:
      - "8004:8080"
    restart: unless-stopped
    env_file:
      - .env
      - .env.secrets
      - .env.dev
    environment:
      - PYTHON_ENV=development
      # Langfuse connection settings
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_INIT_PROJECT_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_INIT_PROJECT_SECRET_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST}
      # Redis Configuration
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_AUTH=${REDIS_AUTH}
      # All credentials and connection strings loaded from env_file:
      # - .env (structure/placeholders)
      # - .env.secrets (actual credentials)
      # - .env.dev (development overrides)
      #
      # Note: Supabase is external service (not in docker)
      - HF_HOME=/tmp/hf
      - HF_HUB_CACHE=/tmp/hf/hub
      - TRANSFORMERS_CACHE=/tmp/hf/transformers
    tty: true
    volumes:
      - ./backend:/app
      - hf-cache-dev:/tmp/hf
    labels:
      - "com.juddges.service=application"
      - "com.juddges.service.type=backend-api"
      - "com.juddges.environment=development"
    depends_on:
      - backend-worker-dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-dev-network

  backend-worker-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: juddges-backend-worker-dev
    command: celery -A app.workers worker --loglevel=info
    restart: unless-stopped
    env_file:
      - .env
      - .env.secrets
      - .env.dev
    environment:
      - PYTHON_ENV=development
      # Langfuse connection settings
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_INIT_PROJECT_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_INIT_PROJECT_SECRET_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST}
      # Redis Configuration
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_AUTH=${REDIS_AUTH}
      # All credentials and connection strings loaded from env_file:
      # - .env (structure/placeholders)
      # - .env.secrets (actual credentials)
      # - .env.dev (development overrides)
      #
      # Note: Supabase is external service (not in docker)
      - HF_HOME=/tmp/hf
      - HF_HUB_CACHE=/tmp/hf/hub
      - TRANSFORMERS_CACHE=/tmp/hf/transformers
    volumes:
      - ./backend:/app
      - hf-cache-dev:/tmp/hf
    labels:
      - "com.juddges.service=application"
      - "com.juddges.service.type=worker"
      - "com.juddges.environment=development"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-dev-network

# ==============================================================================
# Volumes (Development-Specific)
# ==============================================================================

volumes:
  # Development cache volumes
  next-cache-dev:
    name: juddges-next-cache-dev
    driver: local
  hf-cache-dev:
    name: juddges-hf-cache-dev
    driver: local

# ==============================================================================
# Networks
# ==============================================================================

networks:
  # Single development network for all application services
  # External services (Supabase, Redis) are accessed via host.docker.internal or external URLs
  app-dev-network:
    name: juddges-app-dev-network
    driver: bridge

# ==============================================================================
# Notes
# ==============================================================================
# NETWORK ARCHITECTURE:
# - All development services use a single network: app-dev-network
# - External infrastructure (Supabase, Redis, PostgreSQL) accessed via:
#   * External URLs (Supabase: SUPABASE_URL in .env)
#   * host.docker.internal (for local services if needed)
# - No external network dependencies
# - Simplified single-network architecture for development
# ==============================================================================
