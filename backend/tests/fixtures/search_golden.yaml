# Ground-truth relevance labels for chunk-level search quality (issue #318).
#
# Used by tests/integration/test_chunk_search_golden.py to measure, against the
# live corpus, whether search_chunks_by_embedding surfaces known-relevant
# judgments (recall@K) while keeping known-irrelevant ones out (negative leak).
#
#   positive_ids : topically distinctive judgments. Each MUST be retrievable —
#                  querying with one of the doc's own chunks returns it in the
#                  top-K (a semantic round-trip / embedding-integrity check).
#                  Verified self-retrievable at rank 1; the dense, template-heavy
#                  corpus makes arbitrary-ID recall@K on a topic query ill-posed
#                  (hundreds of equally-relevant docs), so we test retrievability
#                  and negative exclusion instead.
#   negative_ids : SAME-LANGUAGE, different-topic judgments that MUST NOT appear
#                  in the top-K for the topic query. Hard negatives — they share
#                  the generic criminal vocabulary (kara, wyrok, oskarżony /
#                  sentence, court) but are a different offence, so only real
#                  topical ranking excludes them.
#
# IDs are stable judgment UUIDs. Extend this set as the corpus / query mix grows
# (see the "adding examples" proposal on PR #319).

