# Jurisdiction Field Mappings for Universal Legal Document Schema
# Maps field names and descriptions between English (UK) and Polish jurisdictions
# Used to generate localized extraction prompts

jurisdictions:
  en_uk:
    name: "England & Wales"
    language: "en"

  en_us:
    name: "United States"
    language: "en"

  pl:
    name: "Poland"
    language: "pl"

field_mappings:
  # Case Identification
  neutral_citation_number:
    en_uk: "Neutral Citation Number (e.g., [2024] EWCA Crim 123)"
    en_us: "Case Citation (e.g., 123 F.3d 456)"
    pl: "Sygnatura akt (np. II AKa 123/24)"

  case_number:
    en_uk: "Case Number"
    en_us: "Docket Number"
    pl: "Numer sprawy"

  case_name:
    en_uk: "Case Name (e.g., R v Smith)"
    en_us: "Case Name (e.g., State v. Smith)"
    pl: "Nazwa sprawy (np. Prokuratura Rejonowa przeciwko Kowalskiemu)"

  date_of_appeal_court_judgment:
    en_uk: "Date of Appeal Court Judgment"
    en_us: "Date of Appellate Court Decision"
    pl: "Data wyroku sądu odwoławczego"

  # Court and Judges
  appeal_court_judges_names:
    en_uk: "Appeal Court Judges Names (e.g., Lord Justice Smith, Mr Justice Jones)"
    en_us: "Appellate Judges Names"
    pl: "Skład sędziowski sądu odwoławczego"

  conv_court_names:
