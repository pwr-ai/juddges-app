    en_us: "Defense Attorney Name"
    pl: "Obrońca oskarżonego (imię i nazwisko)"

  crown_attorney_general_representative_name:
    en_uk: "Crown/Attorney General Representative Name"
    en_us: "Prosecutor/District Attorney Name"
    pl: "Prokurator (imię i nazwisko)"

  # Conviction Details
  convict_plea_dates:
