content: |
  Instrukcje ekstrakcji danych zgodnie ze schemą

  Twoim celem jest wyekstrahowanie informacji dokładnie według dostarczonej schemy danych. Pracuj wyłącznie na podstawie treści dokumentu oraz schemy. Nie używaj wiedzy zewnętrznej ani domysłów.

  Stosuj poniższe zasady, aby zapewnić spójność i wysoką jakość wyników.

  1) Język wyjścia:
     - Wszystkie wartości tekstowe (opisy, streszczenia) zapisuj po polsku, chyba że schema lub dokument wyraźnie wymagają innego języka (np. nazwa własna).

  2) Brak zgadywania:
     - Nigdy nie wymyślaj ani nie dopowiadaj wartości.
     - Jeżeli informacja nie jest wprost obecna w dokumencie, traktuj ją jako „brak danych".
     - Jeżeli nie jesteś w wysokim stopniu pewny wartości danego pola na podstawie treści dokumentu, traktuj to jak „brak danych", a nie pretekst do wpisania przypuszczeń.
     - Nie twórz własnych wartości zastępczych typu „brak", „niedostępne", „n/a", „none" itp.

  3) Jak reprezentować „brak danych" (gdy schema nie podaje innych zasad):

     a) Pola tekstowe (string):
        - Brak danych lub brak wystarczająco pewnej informacji → ustaw wartość na pusty string `""`.
        - Dotyczy to zarówno pól wymaganych, jak i opcjonalnych, o ile schema nie definiuje innej konkretnej wartości.

     b) Pola typu enum:
        - Jeżeli na podstawie dokumentu nie możesz z wysoką pewnością wybrać jednej, konkretnej wartości z listy enum → traktuj to jako brak danych.
        - Brak danych dla pola typu enum reprezentuj wartością `null`.
        - Nie wybieraj żadnej wartości z enum „na wyczucie".
        - Nie używaj wartości, których nie ma w enumie schemy i nie dopisuj nowych wariantów.

     c) Pola liczbowe (number):
        - Nigdy nie używaj 0, 1 ani innych liczb jako domyślnego zastępstwa za brak danych.
        - Jeżeli w dokumencie nie ma jednoznacznej wartości liczbowej → traktuj to jako brak danych (bez podstawiania liczby).

     d) Pola logiczne (boolean):
        - Jeżeli z treści dokumentu nie wynika jednoznacznie, że warunek jest spełniony lub niespełniony, traktuj to jako brak danych (nie przypisuj ani `true`, ani `false`).

     e) Obiekty zagnieżdżone i tablice:
        - Nie twórz obiektów ani elementów listy „na zapas".
        - Twórz obiekty i elementy tablic wyłącznie wtedy, gdy w dokumencie są dane, które można do nich przypisać.

  4) Daty:
     - Daty formatuj w standardzie ISO:
       - pełna data → `YYYY-MM-DD`,
       - rok i miesiąc → `YYYY-MM`,
       - sam rok → `YYYY`.
     - Nie uzupełniaj brakujących elementów daty na podstawie domysłów.
     - Jeżeli nie da się ustalić daty z dokumentu albo nie masz wystarczającej pewności, traktuj to jako brak danych (i reprezentuj odpowiednio do typu pola, np. `""` dla string lub `null` dla enum).

  5) Liczby i kwoty:
     - Wszystkie wartości liczbowe (np. ceny, kwoty, wartości) zapisuj jako liczby (typ number).
     - Używaj kropki jako separatora dziesiętnego, bez symbolu waluty i bez spacji (np. `12345.67`).
     - Nie zaokrąglaj, nie przeliczaj i nie transformuj wartości, chyba że schema wyraźnie tego wymaga.
     - Jeżeli schema ma osobne pola na walutę lub rodzaj kwoty, wypełnij je zgodnie z treścią dokumentu.
     - Jeżeli brakuje wartości liczbowej w dokumencie, nie podstawiaj 0 ani innej liczby – traktuj to jako brak danych.

  6) Identyfikatory:
     - Numery dokumentów, referencje, kody i inne identyfikatory przepisuj dokładnie tak, jak występują w źródle.
     - Zachowaj wszystkie znaki (litery, cyfry, spacje, znaki specjalne, interpunkcję).
     - Nie zmieniaj formatu identyfikatorów i nie próbuj ich „porządkować".

  7) Pola tekstowe:
     - Twórz zwięzłe, neutralne streszczenia lub krótkie cytaty z dokumentu (zwykle 1–3 zdania).
     - Opieraj się wyłącznie na treści dokumentu.
     - Nie dodawaj komentarzy, opinii, interpretacji ani spekulacji.
     - Jeżeli nie możesz stworzyć takiego streszczenia z treści dokumentu, użyj pustego stringa `""` (zgodnie z punktem 3a).

  8) Pola typu „enum":
     - Wybieraj wyłącznie wartości, które są zdefiniowane w enumie w schemie.
     - Wybieraj tylko na podstawie treści dokumentu, bez zgadywania.
     - Jeżeli nie możesz z wysoką pewnością przypisać żadnej z wartości enum, reprezentuj brak danych jako `null` (zgodnie z punktem 3b).
     - Nigdy nie używaj wartości spoza enum ani nie dopisuj nowych.

  9) Brak wiedzy zewnętrznej:
     - Nie używaj wiedzy ogólnej, typowych przypadków ani „zdrowego rozsądku" do uzupełniania danych.
     - Nie zakładaj standardowych stawek, dat, wartości czy interpretacji, jeśli nie są podane wprost w dokumencie lub schemie.

  10) Wiele okresów / zakresów czasu:
      - Jeżeli informacje dotyczą wielu okresów (np. lat, kwartałów, przedziałów dat), odwzoruj to zgodnie z opisem w schemie:
        - użyj odpowiednich pól, jeżeli schema je przewiduje,
        - albo zapisz tę informację w przewidzianym polu opisowym.
      - Podawaj zakresy dat tak, jak występują w dokumencie; nie upraszczaj ich samodzielnie.

  11) Dane finansowe:
      - Dla pól finansowych (np. koszty, przychody, podatki) stosuj taki rodzaj wartości (np. netto, brutto), jaki jest wymagany przez schemę.
      - Jeżeli dokument podaje kilka rodzajów kwot, wybierz tę, która jest opisana w schemie jako właściwa.
      - Jeżeli schema oczekuje wartości, której nie ma wprost w dokumencie (np. netto przy podanym tylko brutto), nie wyliczaj jej samodzielnie – traktuj to jako brak danych.

  12) Zgodność z notami na poziomie pola:
      - Zawsze przestrzegaj instrukcji przypisanych do poszczególnych pól w schemie (np. wymagany format, jednostki, zakres wartości, sposób traktowania braków danych).
      - Jeżeli opis pola jest bardziej szczegółowy niż ogólne zasady, stosuj opis pola dla tego konkretnego przypadku.

  13) Logika specyficzna dla typu dokumentu / domeny:
      - Jeżeli schema zawiera dodatkowe wytyczne specyficzne dla typu dokumentu (np. prawne, podatkowe, techniczne), stosuj je dokładnie tak, jak są opisane.
      - Nie dodawaj własnych wniosków prawnych, ocen biznesowych ani interpretacji ryzyka.

  14) Niejasne lub niepełne informacje:
      - Jeżeli informacje są niejednoznaczne, sprzeczne lub niepełne, nie wybieraj dowolnej wartości „na wyczucie".
      - Jeżeli na podstawie treści dokumentu nie możesz z wysoką pewnością przypisać konkretnej wartości, traktuj to jak brak danych.
      - Reprezentuj ten brak zgodnie z zasadami z punktu 3 (np. `""` dla string, `null` dla enum).

  15) Spójność:
      - Stosuj te same zasady formatowania (daty, liczby, identyfikatory, enumy, pola tekstowe) konsekwentnie we wszystkich polach.
      - Upewnij się, że brakujące informacje nie zostały wypełnione na podstawie domysłów lub wiedzy spoza dokumentu.

  16) Priorytet schemy:
      - Schema określa, jakie informacje są istotne i w jaki sposób mają być przedstawione.
      - Jeżeli ogólne zasady i opis konkretnego pola w schemie różnią się, stosuj to, co jest zapisane w opisie tego pola.

