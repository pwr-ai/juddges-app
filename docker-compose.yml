# docker-compose.yml
# Production Juddges Application Services
#
# ENVIRONMENT CONFIGURATION:
#   - All configuration in .env (non-secrets) and .env.secrets (secrets)
#
# USAGE:
#   docker compose up -d

services:
  # ============================================================================
  # Application Services
  # ============================================================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: juddges-frontend
    expose:
      - "3006"
    restart: unless-stopped
    env_file:
      - .env
      - .env.secrets
    environment:
      - PORT=3006
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
      - API_BASE_URL=${API_BASE_URL}
      - "VIRTUAL_HOST=${VIRTUAL_HOST_FRONTEND}"
      - "VIRTUAL_PORT=${VIRTUAL_PORT_FRONTEND}"
      - "LETSENCRYPT_HOST=${VIRTUAL_HOST_FRONTEND}"
      - "LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}"
    # All environment variables loaded from env_file
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.depends-on=backend"
      - "com.juddges.service=application"
      - "com.juddges.service.type=frontend"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
      - nginx-router_proxy-tier  # Optional: for nginx-proxy reverse proxy integration
    # Health check for Next.js frontend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3006/', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Structured logging with rotation for production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: juddges-backend
    expose:
      - "8002"
    restart: unless-stopped
    env_file:
      - .env
      - .env.secrets
    environment:
      - "VIRTUAL_HOST=${VIRTUAL_HOST_BACKEND}"
      - "VIRTUAL_PORT=${VIRTUAL_PORT_BACKEND}"
      - "LETSENCRYPT_HOST=${VIRTUAL_HOST_BACKEND}"
      - "LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}"
    # All environment variables loaded from env_file
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.juddges.service=application"
      - "com.juddges.service.type=backend-api"
    # Backend API does not need to depend on backend-worker
    # Workers are independent task processors and API can start without them
    # Remove depends_on to allow independent scaling and deployment
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
      - nginx-router_proxy-tier  # Optional: for nginx-proxy reverse proxy integration
    # Health check for FastAPI backend using dedicated health endpoint
    # Uses /health/healthz - lightweight check without authentication
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Structured logging with rotation for production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
        reservations:
          cpus: '4'
          memory: 12G

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: juddges-backend-worker
    command: celery -A app.workers worker --loglevel=info
    restart: unless-stopped
    # PRODUCTION NOTE: Development volume mount removed for production deployment
    # In production, code is baked into the Docker image at build time for:
    # - Immutable deployments (no runtime code changes)
    # - Better performance (no bind mount overhead)
    # - Security (no host filesystem access)
    # - Consistency (same code across all environments)
    #
    # For local development, uncomment the following line:
    # volumes:
    #   - ./backend:/app
    env_file:
      - .env
      - .env.secrets
    # All environment variables loaded from env_file
    labels:
      - "com.juddges.service=application"
      - "com.juddges.service.type=worker"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
    # Health check for Celery worker
    # Checks if Celery process is running and responsive
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers inspect ping -d celery@$$HOSTNAME"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s
    # Structured logging with rotation for production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

# ==============================================================================
# Networks
# ==============================================================================

networks:
  # Internal network for inter-service communication (frontend, backend, backend-worker)
  app-network:
    name: juddges-app-network
    driver: bridge

  # Optional: External nginx-proxy reverse proxy network
  # Only needed if using jwilder/nginx-proxy for automatic SSL/reverse proxy
  # Comment out if not using nginx-proxy
  nginx-router_proxy-tier:
    external: true
