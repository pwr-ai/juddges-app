# docker-compose.dev.yml
# Development Juddges Application Services
#
# Features:
# - Hot reload for frontend and backend
# - Development-specific volumes for code mounting
# - Exposed ports for direct access
# - Development environment variables
# - No health checks (faster startup, not needed for local dev)
# - No resource limits (full access to host resources)
# - Minimal configuration (easier debugging)
#
# ENVIRONMENT CONFIGURATION:
#   - .env (gitignored, contains all actual values)
#   - .env.example (committed, template with variable names)
#
# SETUP:
#   1. Copy .env.example to .env
#   2. Fill in actual values in .env
#   3. Run: docker compose -f docker-compose.dev.yml up -d

services:
    # ============================================================================
    # Application Services (Development)
    # ============================================================================

    frontend-dev:
        build:
            context: ./frontend
            dockerfile: Dockerfile
            target: development
        container_name: juddges-frontend-dev
        ports:
            - "3007:3000"
        restart: unless-stopped
        command: ["npx", "next", "dev"]
        env_file:
            - .env
        environment:
            # Development environment override
            - NODE_ENV=development
            # Browser-facing URL exposed on the host machine
            - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8004}
            # Container-to-container communication must use Docker service names
            - API_BASE_URL=http://backend-dev:8080
        volumes:
            - ./frontend:/app
            - /app/node_modules
            - /app/.next # Keep .next in container to avoid permission issues
        labels:
            - "com.juddges.service=application"
            - "com.juddges.service.type=frontend"
            - "com.juddges.environment=development"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        networks:
            - app-dev-network

    backend-dev:
        build:
            context: ./backend
            dockerfile: Dockerfile
            target: development
        container_name: juddges-backend-dev
        ports:
            - "8004:8080"
        restart: unless-stopped
        env_file:
            - .env
        environment:
            # Development environment override
            - PYTHON_ENV=development
            # Internal service discovery for container-to-container communication
            - REDIS_HOST=redis-dev
            - REDIS_PORT=6379
            - REDIS_URL=redis://redis-dev:6379/0
            - CELERY_BROKER_URL=redis://redis-dev:6379/0
            - CELERY_BACKEND_URL=redis://redis-dev:6379/0
            - CELERY_PROJECT_NAME=${CELERY_PROJECT_NAME:-juddges}
            - MEILISEARCH_URL=http://meilisearch-dev:7700
            - MEILISEARCH_INTERNAL_URL=http://meilisearch-dev:7700
            # HuggingFace cache configuration (container-specific paths)
            - HF_HOME=/tmp/hf
            - HF_HUB_CACHE=/tmp/hf/hub
            - TRANSFORMERS_CACHE=/tmp/hf/transformers
        # All other environment variables (Supabase, OpenAI, Redis, Langfuse, etc.) loaded from env_file
        tty: true
        volumes:
            - ./backend:/app
            - ./scripts:/app/scripts  # expose repo-root scripts/ as a Python package inside the container
            - hf-cache-dev:/tmp/hf
        labels:
            - "com.juddges.service=application"
            - "com.juddges.service.type=backend-api"
            - "com.juddges.environment=development"
        depends_on:
            - backend-worker-dev
            - meilisearch-dev
            - redis-dev
        extra_hosts:
            - "host.docker.internal:host-gateway"
        networks:
            - app-dev-network

    # ============================================================================
    # Search Infrastructure (Optional, Development)
    # ============================================================================

    meilisearch-dev:
        image: getmeili/meilisearch:${MEILISEARCH_IMAGE_TAG:-v1.43.0}
        container_name: juddges-meilisearch-dev
        restart: unless-stopped
        ports:
            - "7700:7700"
        environment:
            - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-dev-master-key}
            - MEILI_ENV=development
            - MEILI_LOG_LEVEL=INFO
            - MEILI_MAX_INDEXING_MEMORY=${MEILI_MAX_INDEXING_MEMORY:-1536MiB}
        # Dev now defaults to the same memory ceiling as prod so dump imports,
        # settings reindexing, and vector-heavy rebuilds do not regress during
        # the v1.13 -> v1.43 migration. The image tag stays overridable via
        # MEILISEARCH_IMAGE_TAG for quick rollback/testing without another edit.
        # HNSW indexing of large vector corpora opens many mmap files; default 1024 fd
        # soft limit triggers "too_many_open_files" during embedder registration.
        # Soft raised to match hard after observing EMFILE at 65536 during apply-settings.
        ulimits:
            nofile:
                soft: 524288
                hard: 524288
        volumes:
            - meilisearch-data-dev:/meili_data
        labels:
            - "com.juddges.service=infrastructure"
            - "com.juddges.service.type=search"
            - "com.juddges.environment=development"
        networks:
            - app-dev-network

    redis-dev:
        image: redis:7-alpine
        container_name: juddges-redis-dev
        restart: unless-stopped
        expose:
            - "6379"
        command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
        volumes:
            - redis-data-dev:/data
        labels:
            - "com.juddges.service=infrastructure"
            - "com.juddges.service.type=redis"
            - "com.juddges.environment=development"
        networks:
            - app-dev-network

    # ============================================================================
    # Background Workers (Development)
    # ============================================================================

    backend-worker-dev:
        build:
            context: ./backend
            dockerfile: Dockerfile
            target: development
        container_name: juddges-backend-worker-dev
        command: celery -A app.workers worker --beat --loglevel=info
        restart: unless-stopped
        env_file:
            - .env
        environment:
            # Development environment override
            - PYTHON_ENV=development
            # Internal service discovery for container-to-container communication
            - REDIS_HOST=redis-dev
            - REDIS_PORT=6379
            - REDIS_URL=redis://redis-dev:6379/0
            - CELERY_BROKER_URL=redis://redis-dev:6379/0
            - CELERY_BACKEND_URL=redis://redis-dev:6379/0
            - CELERY_PROJECT_NAME=${CELERY_PROJECT_NAME:-juddges}
            - MEILISEARCH_URL=http://meilisearch-dev:7700
            - MEILISEARCH_INTERNAL_URL=http://meilisearch-dev:7700
            # HuggingFace cache configuration (container-specific paths)
            - HF_HOME=/tmp/hf
            - HF_HUB_CACHE=/tmp/hf/hub
            - TRANSFORMERS_CACHE=/tmp/hf/transformers
        # All other environment variables (Supabase, OpenAI, Redis, Langfuse, etc.) loaded from env_file
        volumes:
            - ./backend:/app
            - ./scripts:/app/scripts  # expose repo-root scripts/ as a Python package inside the container
            - hf-cache-dev:/tmp/hf
        labels:
            - "com.juddges.service=application"
            - "com.juddges.service.type=worker"
            - "com.juddges.environment=development"
        depends_on:
            - meilisearch-dev
            - redis-dev
        extra_hosts:
            - "host.docker.internal:host-gateway"
        networks:
            - app-dev-network

# ==============================================================================
# Volumes (Development-Specific)
# ==============================================================================

volumes:
    # Development cache volumes
    next-cache-dev:
        name: juddges-next-cache-dev
        driver: local
    hf-cache-dev:
        name: juddges-hf-cache-dev
        driver: local
    meilisearch-data-dev:
        name: juddges-meilisearch-data-dev
        driver: local
    redis-data-dev:
        name: juddges-redis-data-dev
        driver: local

# ==============================================================================
# Networks
# ==============================================================================

networks:
    # Single development network for all application services
    # Internal infrastructure uses Docker service names; external services use URLs or host.docker.internal
    app-dev-network:
        name: juddges-app-dev-network
        driver: bridge

# ==============================================================================
# Notes
# ==============================================================================
# DEVELOPMENT vs PRODUCTION DIFFERENCES:
#
# Development services (docker-compose.dev.yml) have:
# - No health checks (faster startup, not needed for local dev)
# - No resource limits (full access to host resources)
# - No watchtower auto-update labels (not used in dev)
# - No structured logging configuration (use docker logs directly)
# - Minimal configuration (easier debugging)
# - Hot reload enabled via volume mounts
#
# Production services (docker-compose.yml) include:
# - Health checks for monitoring (frontend, backend, worker)
# - Resource limits to prevent resource exhaustion
# - Watchtower integration for automatic updates
# - Structured logging with rotation
# - Code baked into images (no volume mounts)
#
# NETWORK ARCHITECTURE:
# - All development services use a single network: app-dev-network
# - Internal infrastructure (Redis, Meilisearch) uses Docker service names
# - External infrastructure (Supabase, PostgreSQL) is accessed via:
#   * External URLs (Supabase: SUPABASE_URL in .env)
#   * host.docker.internal (for host-local services if needed)
# - No external network dependencies
# - Simplified single-network architecture for development
# ==============================================================================
